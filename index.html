<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Pop Culture Quiz</h1>

    <div class="poster-wrapper">
        <img src="./poster.jpeg" alt="tv show poster" class="poster">
    <img src="./poster2.jpeg" alt="tv show poster" class="poster">
    </div>

    <p>
        Think you know pop culture? Let me be the judge of that!
    </p>

    <form action="/page2.html" method="GET">
        <label for="name">Your Name:</label>
        <input type="text" id="fullname" name="fullname" required>
    
        <label for="actor">Favorite Actor:</label>
        <input type="text" id="actor" name="actor" required>
    
        <label for="movie">Favorite Movie:</label>
        <input type="text" id="movie" name="movie" required>
    
        <label for="tvshow">Favorite TV Show:</label>
        <input type="text" id="tvshow" name="tvshow" required>
    
        <label for="genre">Favorite Genre:</label>
        <select id="genre" name="genre" required>
            <option value="">Select a genre</option>
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="drama">Drama</option>
            <option value="horror">Horror</option>
            <option value="sci-fi">Sci-Fi</option>
            <option value="fantasy">Fantasy</option>
            <option value="romance">Romance</option>
            <option value="thriller">Thriller</option>
        </select>
    
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

    <button id="toggle">DARK</button>

    <script src="script.js"></script>
</body>
</html>
